{{- range .Values.tenants }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ .name }}-quota
  namespace: {{ .name }}
  labels:
    {{- include "cluster-policies.labels" $ | nindent 4 }}
spec:
  hard:
    {{- toYaml .quota | nindent 4 }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ .name }}-limits
  namespace: {{ .name }}
  labels:
    {{- include "cluster-policies.labels" $ | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        {{- toYaml .limits.default | nindent 8 }}
      defaultRequest:
        {{- toYaml .limits.defaultRequest | nindent 8 }}
{{- if .denyAllIngress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .name }}-deny-all-ingress
  namespace: {{ .name }}
  labels:
    {{- include "cluster-policies.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
{{- end }}
{{- if .redisNetworkPolicy }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .name }}-allow-redis
  namespace: {{ .name }}
  labels:
    {{- include "cluster-policies.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: redis-enterprise
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9443
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8070
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 8080
{{- end }}
{{- end }}
