apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operatorGroupName }}
  namespace: {{ .Values.operatorNamespace }}
  labels:
    {{- include "redis-enterprise.labels" . | nindent 4 }}
spec:
  targetNamespaces:
    {{- range .Values.targetNamespaces }}
    - {{ . | quote }}
    {{- end }}
